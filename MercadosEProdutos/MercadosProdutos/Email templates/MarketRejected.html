<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mercado Rejeitado</title>
</head>
<body style="font-family: Arial, sans-serif; background-color:#f4f4f4; padding:20px;">
    
    <div style="max-width:600px; margin:auto; background:#ffffff; padding:20px; border-radius:8px;">
        
        <h2 style="color:#c62828;">❌ Solicitação Rejeitada</h2>
        
        <p>Olá, <strong>{{userName}}</strong>,</p>

        <p>Infelizmente, seu mercado <strong>{{marketName}}</strong> não foi aprovado.</p>

        <p><strong>Motivo:</strong></p>
        <p style="background:#fce4ec; padding:10px; border-radius:5px;">
            {{reason}}
        </p>

        <p>Você pode corrigir as informações e enviar uma nova solicitação.</p>

        <br>

        <a href="{{retryLink}}" 
           style="display:inline-block; padding:10px 15px; background:#c62828; color:#fff; text-decoration:none; border-radius:5px;">
           Corrigir e reenviar
        </a>

        <br><br>

        <p style="font-size:12px; color:#888;">Se precisar de ajuda, entre em contato com o suporte.</p>
    </div>

</body>
</html>
